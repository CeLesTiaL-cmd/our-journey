<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For My Love ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300;1,400;1,600&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>

:root {
  --bg:    #06030f;
  --rose:  #e8637a;
  --gold:  #e8bb78;
  --cream: #f5e6d3;
  --dim:   rgba(245,230,211,0.5);
  --glow:  rgba(232,99,122,0.45);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--cream);
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  cursor: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── CUSTOM CURSOR ── */
#cur {
  position: fixed; z-index: 10000;
  pointer-events: none;
  font-size: 18px; line-height: 1;
  transform: translate(-50%,-50%);
  transition: transform 0.08s;
  filter: drop-shadow(0 0 5px var(--rose));
  will-change: left, top;
}

/* ── CANVAS ── */
#bgc {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}

/* ── AURORA ── */
.aurora {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
}
.aurora::before, .aurora::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  animation: aShift 14s ease-in-out infinite alternate;
  will-change: transform;
}
.aurora::before {
  width: 80vw; height: 60vw;
  top: -20%; left: -10%;
  background: radial-gradient(ellipse, rgba(140,20,60,0.28) 0%, transparent 70%);
}
.aurora::after {
  width: 70vw; height: 70vw;
  bottom: -15%; right: -10%;
  background: radial-gradient(ellipse, rgba(70,15,90,0.22) 0%, transparent 70%);
  animation-direction: alternate-reverse;
  animation-duration: 18s;
}
@keyframes aShift {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(4%,3%) scale(1.08); }
}

/* ── INTRO SCREEN ── */
#intro {
  position: fixed; inset: 0; z-index: 9000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px;
  background: var(--bg);
  cursor: pointer;
  transition: opacity 1.2s ease, visibility 1.2s;
}
#intro.gone { opacity: 0; visibility: hidden; }

.intro-ring {
  width: 90px; height: 90px;
  border-radius: 50%;
  border: 1px solid rgba(232,99,122,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  animation: ringPulse 2s ease-in-out infinite;
  position: relative;
}
.intro-ring::before {
  content: '';
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(232,99,122,0.15);
  animation: ringPulse 2s 0.5s ease-in-out infinite;
}
@keyframes ringPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 var(--glow); }
  50%       { transform: scale(1.06); box-shadow: 0 0 30px 10px rgba(232,99,122,0.15); }
}

.intro-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: clamp(1rem, 4vw, 1.3rem);
  color: var(--dim);
  letter-spacing: 0.18em;
}
.intro-hint {
  font-size: 0.6rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(245,230,211,0.25);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

/* ── PROGRESS ── */
#ptrack { position: fixed; top:0; left:0; width:100%; height:2px; z-index:999; background: rgba(255,255,255,0.04); }
#pfill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--rose), var(--gold));
  transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 12px var(--rose), 0 0 24px rgba(232,99,122,0.3);
  position: relative;
}
#pfill::after {
  content: '';
  position: absolute; right: -4px; top: -3px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold), 0 0 20px rgba(232,192,120,0.5);
}

/* ── NAV DOTS ── */
#dots {
  position: fixed; left: 18px; top: 50%; transform: translateY(-50%);
  z-index: 100; display: flex; flex-direction: column; gap: 12px;
}
.dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(245,230,211,0.18);
  transition: all 0.35s;
  cursor: pointer;
}
.dot.on {
  background: var(--rose);
  box-shadow: 0 0 8px var(--rose), 0 0 16px rgba(232,99,122,0.4);
  transform: scale(2);
}

/* ── STAGE ── */
#stage { position: fixed; inset: 0; z-index: 2; }

section {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 60px 28px 48px;
  transition: transform 0.95s cubic-bezier(0.76,0,0.24,1), opacity 0.95s ease;
  will-change: transform;
}

/* ── HERO ── */
.hero { gap: 14px; text-align: center; }

.hero-eye {
  font-size: 0.58rem; letter-spacing: 0.55em;
  text-transform: uppercase; color: var(--gold);
  opacity: 0; animation: fadeUp 1s 0.4s ease forwards;
}

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: clamp(3.8rem, 14vw, 7.5rem);
  line-height: 0.95;
  background: linear-gradient(145deg, var(--cream) 0%, #f0a0b0 40%, var(--gold) 80%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 40px rgba(232,99,122,0.25));
  opacity: 0; animation: fadeUp 1.1s 0.7s ease forwards;
}

.hero-sub {
  font-size: 0.68rem; letter-spacing: 0.2em; color: var(--dim);
  opacity: 0; animation: fadeUp 1s 1.1s ease forwards;
}

.scroll-mouse {
  position: absolute; bottom: 36px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  opacity: 0; animation: fadeUp 1s 1.6s ease forwards;
}
.mouse {
  width: 20px; height: 30px;
  border: 1px solid rgba(232,99,122,0.35);
  border-radius: 12px; position: relative;
}
.mouse::after {
  content: ''; position: absolute;
  top: 5px; left: 50%; transform: translateX(-50%);
  width: 3px; height: 6px; border-radius: 2px;
  background: var(--rose);
  animation: mouseDrop 1.6s ease-in-out infinite;
}
@keyframes mouseDrop {
  0%,100% { top:5px; opacity:1; }
  60%     { top:16px; opacity:0.2; }
}
.scroll-text { font-size:0.55rem; letter-spacing:0.35em; text-transform:uppercase; color:rgba(245,230,211,0.25); }

/* ── SLIDES ── */
.slide { gap: 26px; }

.slide-num {
  position: absolute; top: 26px; right: 22px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 0.72rem;
  color: rgba(232,192,120,0.35); letter-spacing: 0.18em;
}

.frame-wrap {
  position: relative;
  width: min(300px, 80vw);
  transition: transform 0.4s ease;
}

/* Gradient border */
.frame-wrap::before {
  content: '';
  position: absolute; inset: -1.5px;
  border-radius: 22px; z-index: -1;
  background: linear-gradient(135deg, rgba(232,99,122,0.6), rgba(232,192,120,0.15) 50%, rgba(232,99,122,0.4));
}

/* Ambient glow */
.frame-wrap::after {
  content: '';
  position: absolute; inset: -20px; border-radius: 40px; z-index: -2;
  background: radial-gradient(ellipse, rgba(232,99,122,0.12) 0%, transparent 70%);
  animation: glowPulse 3s ease-in-out infinite alternate;
}
@keyframes glowPulse {
  from { opacity: 0.6; }
  to   { opacity: 1; }
}

.frame-wrap img {
  width: 100%;
  height: min(380px, 52vh);
  object-fit: cover;
  border-radius: 20px;
  display: block;
}
.frame-wrap img.reveal {
  animation: revealSlide 1.1s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes revealSlide {
  from { opacity:0; filter:blur(12px) brightness(0.4); transform:scale(0.93); }
  to   { opacity:1; filter:blur(0)    brightness(1);   transform:scale(1);    }
}

/* Light leak */
.light-leak {
  position: absolute; inset: 0; border-radius: 20px; pointer-events: none;
  background: linear-gradient(120deg, rgba(232,192,120,0.18) 0%, transparent 50%, rgba(232,99,122,0.1) 100%);
}

.caption { text-align: center; }
.caption h2 {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: clamp(1.7rem, 6vw, 2.6rem);
  background: linear-gradient(90deg, var(--cream) 0%, var(--gold) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.caption p {
  font-size: 0.78rem; color: var(--dim);
  letter-spacing: 0.07em; min-height: 20px; font-weight: 200;
}

/* ── FINAL ── */
.final { gap: 12px; text-align: center; }
.final h1 {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: clamp(3.2rem, 15vw, 9rem);
  line-height: 0.9;
  background: linear-gradient(145deg, var(--rose) 0%, var(--gold) 55%, var(--cream) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 50px rgba(232,99,122,0.4));
  animation: heartbeat 1.8s ease-in-out infinite;
}
@keyframes heartbeat {
  0%,100%{ transform:scale(1);   filter:drop-shadow(0 0 50px rgba(232,99,122,0.4)); }
  14%    { transform:scale(1.06);filter:drop-shadow(0 0 70px rgba(232,99,122,0.6)); }
  28%    { transform:scale(1);   }
  42%    { transform:scale(1.04);filter:drop-shadow(0 0 60px rgba(232,99,122,0.5)); }
}
.final-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: clamp(1.1rem, 4.5vw, 1.8rem);
  color: var(--gold); letter-spacing: 0.12em;
  animation: pulse 2.5s 0.4s ease-in-out infinite alternate;
}
@keyframes pulse { from{opacity:0.7;} to{opacity:1;} }

/* ── MUSIC PLAYER ── */
#mplayer {
  position: fixed; bottom: 22px; right: 18px; z-index: 1000;
  display: flex; align-items: center; gap: 10px;
  background: rgba(6,3,15,0.75);
  border: 1px solid rgba(232,99,122,0.28);
  border-radius: 50px; padding: 8px 18px 8px 9px;
  backdrop-filter: blur(16px); cursor: pointer;
  transition: border-color 0.3s, box-shadow 0.3s;
}
#mplayer:hover { border-color:rgba(232,99,122,0.7); box-shadow:0 0 20px rgba(232,99,122,0.15); }

#mbtn {
  width:30px; height:30px; border-radius:50%;
  background: linear-gradient(135deg, var(--rose), var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-size:12px; flex-shrink:0;
  box-shadow: 0 0 14px var(--glow), 0 0 28px rgba(232,99,122,0.2);
}
.wbars { display:flex; align-items:flex-end; gap:2px; height:18px; }
.wb {
  width:3px; border-radius:2px; background:var(--rose);
  animation: wbPulse 0.7s ease-in-out infinite alternate;
}
.wb:nth-child(1){ height:6px;  animation-delay:0s;    }
.wb:nth-child(2){ height:13px; animation-delay:0.12s; }
.wb:nth-child(3){ height:9px;  animation-delay:0.24s; }
.wb:nth-child(4){ height:15px; animation-delay:0.08s; }
.wb:nth-child(5){ height:5px;  animation-delay:0.18s; }
@keyframes wbPulse {
  from { transform:scaleY(0.2); opacity:0.4; }
  to   { transform:scaleY(1);   opacity:1;   }
}
.wbars.off .wb { animation-play-state: paused; transform:scaleY(0.3); opacity:0.3; }

#mlabel { font-size:0.62rem; letter-spacing:0.12em; color:var(--dim); text-transform:uppercase; min-width:44px; }

/* ── PETALS ── */
.petal {
  position: fixed; pointer-events: none; z-index: 4;
  animation: petalFall linear forwards;
}
@keyframes petalFall {
  0%   { transform: translateY(-5vh) rotate(0deg)   translateX(0px);  opacity:0.95; }
  30%  { transform: translateY(28vh) rotate(120deg) translateX(25px);  opacity:0.8;  }
  65%  { transform: translateY(65vh) rotate(260deg) translateX(-15px); opacity:0.6;  }
  100% { transform: translateY(108vh)rotate(400deg) translateX(30px);  opacity:0;    }
}

/* ── CLICK HEARTS ── */
.fheart {
  position: fixed; pointer-events: none; z-index: 6;
  color: var(--rose); line-height: 1;
  animation: fUp 2.4s ease-out forwards;
  filter: drop-shadow(0 0 6px var(--rose));
}
@keyframes fUp {
  0%  { opacity:0; transform:translateY(0) scale(0.4) rotate(-10deg); }
  18% { opacity:1; transform:translateY(-20px) scale(1.1) rotate(5deg); }
  100%{ opacity:0; transform:translateY(-140px) scale(0.7) rotate(-5deg); }
}

/* ── SPARKLE CURSOR TRAIL ── */
.spark {
  position: fixed; pointer-events: none; z-index: 9999;
  border-radius: 50%; background: var(--gold);
  animation: sparkFade 0.6s ease-out forwards;
  will-change: transform, opacity;
}
@keyframes sparkFade {
  from { transform:scale(1); opacity:0.9; }
  to   { transform:scale(0); opacity:0; }
}

/* ── UTIL ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}

</style>
</head>
<body>

<div class="aurora"></div>
<canvas id="bgc"></canvas>
<div id="cur">❤</div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-ring">🌹</div>
  <div class="intro-label">A love story awaits you</div>
  <div class="intro-hint">✦ tap anywhere to begin ✦</div>
</div>

<div id="ptrack"><div id="pfill"></div></div>
<div id="dots"></div>

<!-- MUSIC -->
<div id="mplayer" onclick="toggleMusic()">
  <div id="mbtn">♪</div>
  <div class="wbars off" id="wbars">
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div>
  </div>
  <span id="mlabel">Music</span>
</div>
<audio id="bgm" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- STAGE -->
<div id="stage">
  <section class="hero" id="s0">
    <div class="hero-eye">✦ a love story ✦</div>
    <h1>Our Story</h1>
    <p class="hero-sub">scroll &nbsp;·&nbsp; swipe &nbsp;·&nbsp; breathe</p>
    <div class="scroll-mouse">
      <div class="mouse"></div>
      <div class="scroll-text">scroll</div>
    </div>
  </section>

  <section class="slide" id="s1">
    <div class="slide-num">01 / 03</div>
    <div class="frame-wrap" id="fw1">
      <img src="photo1.jpg" id="img1" alt="">
      <div class="light-leak"></div>
    </div>
    <div class="caption">
      <h2>The First Moment</h2>
      <p id="t1"></p>
    </div>
  </section>

  <section class="slide" id="s2">
    <div class="slide-num">02 / 03</div>
    <div class="frame-wrap" id="fw2">
      <img src="photo2.jpg" id="img2" alt="">
      <div class="light-leak"></div>
    </div>
    <div class="caption">
      <h2>Your Smile</h2>
      <p id="t2"></p>
    </div>
  </section>

  <section class="slide" id="s3">
    <div class="slide-num">03 / 03</div>
    <div class="frame-wrap" id="fw3">
      <img src="photo3.jpg" id="img3" alt="">
      <div class="light-leak"></div>
    </div>
    <div class="caption">
      <h2>Every Moment</h2>
      <p id="t3"></p>
    </div>
  </section>

  <section class="final" id="s4">
    <h1>I Love You</h1>
    <div class="final-sub">forever &amp; always 💛</div>
  </section>
</div>

<script>
/* ═══════════════════════════════════════
   CANVAS — twinkling stars + drifting sparks
═══════════════════════════════════════ */
(function(){
  const c  = document.getElementById('bgc');
  const cx = c.getContext('2d');
  let W, H;
  const resize = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
  resize(); addEventListener('resize', resize);

  const COLORS = ['#f5e6d3','#e8bb78','#e8637a','#ffffff'];
  const stars  = Array.from({length:130}, () => mkStar());

  function mkStar(){
    return {
      x: Math.random() * (W || 800),
      y: Math.random() * (H || 800),
      r: Math.random() * 1.1 + 0.2,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.007,
      col: COLORS[Math.floor(Math.random() * COLORS.length)]
    };
  }

  (function loop(){
    cx.clearRect(0,0,W,H);
    for(const s of stars){
      cx.globalAlpha = Math.max(0, Math.min(1, s.a));
      cx.shadowBlur  = 5; cx.shadowColor = s.col;
      cx.fillStyle   = s.col;
      cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, 6.283); cx.fill();
      s.a += s.da;
      if(s.a <= 0 || s.a >= 1) s.da *= -1;
    }
    cx.globalAlpha = 1; cx.shadowBlur = 0;
    requestAnimationFrame(loop);
  })();
})();

/* ═══════════════════════════════════════
   CUSTOM CURSOR + SPARKLE TRAIL
═══════════════════════════════════════ */
const cur = document.getElementById('cur');
let mx=0, my=0;
addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx + 'px'; cur.style.top = my + 'px';
  if(Math.random() > 0.55) mkSpark(mx, my);
});

function mkSpark(x, y){
  const s = document.createElement('div');
  s.className = 'spark';
  const sz = Math.random() * 5 + 2;
  s.style.cssText = `left:${x + (Math.random()-0.5)*14}px;top:${y + (Math.random()-0.5)*14}px;width:${sz}px;height:${sz}px;`;
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 650);
}

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
const secs = document.querySelectorAll('section');
const N    = secs.length;
let idx = 0, locked = false;

// Build dots
const dotsCon = document.getElementById('dots');
for(let i = 0; i < N; i++){
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' on':'');
  d.onclick = () => go(i);
  dotsCon.appendChild(d);
}

function updateUI(){
  document.getElementById('pfill').style.width = (idx/(N-1)*100) + '%';
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===idx));
}

function go(to){
  secs.forEach((s, i) => {
    s.style.transform = `translateY(${(i-to)*100}%)`;
    s.style.opacity   = Math.abs(i-to) > 1 ? '0' : '1';
  });
  updateUI();
  onEnter(to);
}

function onEnter(to){
  const captions = [
    "Everything changed the moment I saw you…",
    "Your smile is the most beautiful thing I know…",
    "Every moment with you feels like coming home…"
  ];
  if(to >= 1 && to <= 3){
    typeIt(document.getElementById('t'+to), captions[to-1]);
    const img = document.getElementById('img'+to);
    img.classList.remove('reveal');
    void img.offsetWidth;           // reflow
    img.classList.add('reveal');
  }
  if(to === N-1) finalShow();
}

function navigate(dir){
  if(locked) return;
  const nxt = idx + dir;
  if(nxt < 0 || nxt >= N) return;
  locked = true; idx = nxt;
  go(idx);
  setTimeout(() => locked = false, 1000);
}

addEventListener('wheel',  e => navigate(e.deltaY > 0 ? 1 : -1), {passive:true});
addEventListener('keydown', e => {
  if(e.key==='ArrowDown'||e.key==='ArrowRight') navigate(1);
  if(e.key==='ArrowUp'  ||e.key==='ArrowLeft' ) navigate(-1);
});
let ty=0;
addEventListener('touchstart', e => ty = e.touches[0].clientY,       {passive:true});
addEventListener('touchend',   e => {
  const dy = ty - e.changedTouches[0].clientY;
  if(Math.abs(dy) > 40) navigate(dy > 0 ? 1 : -1);
}, {passive:true});

/* ═══════════════════════════════════════
   TYPING EFFECT
═══════════════════════════════════════ */
let typeTmr;
function typeIt(el, text){
  clearInterval(typeTmr);
  el.textContent = ''; let i = 0;
  typeTmr = setInterval(() => {
    el.textContent += text[i++];
    if(i >= text.length) clearInterval(typeTmr);
  }, 52);
}

/* ═══════════════════════════════════════
   MUSIC  — auto-start on first interaction
═══════════════════════════════════════ */
const bgm   = document.getElementById('bgm');
const wbars = document.getElementById('wbars');
const mlbl  = document.getElementById('mlabel');

function startMusic(){
  bgm.volume = 0.55;
  bgm.play().then(() => {
    wbars.classList.remove('off');
    mlbl.textContent = 'Playing';
  }).catch(()=>{});
}

function toggleMusic(){
  if(bgm.paused){ startMusic(); }
  else { bgm.pause(); wbars.classList.add('off'); mlbl.textContent = 'Paused'; }
}

/* ═══════════════════════════════════════
   INTRO SCREEN — triggers first interaction
═══════════════════════════════════════ */
const introEl = document.getElementById('intro');
introEl.addEventListener('click', () => {
  introEl.classList.add('gone');
  startMusic();
}, {once:true});

/* ═══════════════════════════════════════
   CLICK HEARTS
═══════════════════════════════════════ */
const EMOJIS = ['❤️','💕','💖','✨','🌹','💗','🌸'];
addEventListener('click', e => {
  if(e.target.closest('#mplayer') || e.target.closest('#dots') || e.target.closest('#intro')) return;
  for(let i = 0; i < 2; i++){
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'fheart';
      h.textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
      h.style.fontSize = (Math.random()*16+14)+'px';
      h.style.left = (e.clientX + (Math.random()-0.5)*40) + 'px';
      h.style.top  = (e.clientY + (Math.random()-0.5)*20) + 'px';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 2500);
    }, i*120);
  }
});

/* ═══════════════════════════════════════
   FINAL — petals + heart burst
═══════════════════════════════════════ */
let finalDone = false;
function finalShow(){
  if(finalDone) return; finalDone = true;

  // Heart burst
  for(let i = 0; i < 18; i++){
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'fheart';
      h.textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
      h.style.fontSize = (Math.random()*24+16) + 'px';
      h.style.left = (Math.random()*innerWidth)  + 'px';
      h.style.top  = (Math.random()*innerHeight*0.7+100) + 'px';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 2600);
    }, i * 90);
  }

  // Falling petals
  const PETALS = ['🌸','🌺','🌷','🍀','✿','💮'];
  setInterval(() => {
    const p   = document.createElement('div');
    p.className = 'petal';
    p.textContent = PETALS[Math.floor(Math.random()*PETALS.length)];
    p.style.cssText = `left:${Math.random()*100}vw;font-size:${Math.random()*12+9}px;animation-duration:${Math.random()*3+4.5}s;animation-delay:${Math.random()*0.3}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 8000);
  }, 280);
}

/* ═══════════════════════════════════════
   PHOTO 3-D TILT (desktop only)
═══════════════════════════════════════ */
document.querySelectorAll('.frame-wrap').forEach(fw => {
  fw.addEventListener('mousemove', e => {
    const r  = fw.getBoundingClientRect();
    const rx = -((e.clientY - r.top  - r.height/2) / r.height) * 14;
    const ry =  ((e.clientX - r.left - r.width /2) / r.width ) * 14;
    fw.style.transform        = `perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.03)`;
    fw.style.transition       = 'transform 0.1s';
  });
  fw.addEventListener('mouseleave', () => {
    fw.style.transition = 'transform 0.5s ease';
    fw.style.transform  = '';
  });
});

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
go(0);
</script>
