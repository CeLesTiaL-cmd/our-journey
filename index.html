<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --text:#222;
  --accent:#ff4d6d;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* PROGRESS */
.progress{
  position:fixed;
  top:0;
  left:0;
  height:4px;
  background:var(--accent);
  width:0%;
  z-index:999;
}

/* SECTION */
section{
  height:100vh;
  width:100%;
  position:absolute;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition:transform 0.8s ease;
}

/* HERO */
.hero h1{color:var(--accent);font-size:2.5rem;}
.hero p{opacity:0.6;margin-top:10px;}

/* SLIDES */
.slide img{
  width:90%;
  max-width:380px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
  animation:reveal 1.2s ease;
}

.caption h2{color:var(--accent);margin-top:15px;}
.caption p{opacity:0.7;min-height:24px;}

/* FINAL */
.final h1{
  color:var(--accent);
  font-size:2.5rem;
}

.love{
  font-size:2rem;
  color:var(--accent);
  animation:lovePulse 1s infinite alternate;
}

/* MUSIC */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--accent);
  color:white;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

/* ANIMATIONS */
@keyframes reveal{
  from{opacity:0;filter:blur(10px);transform:scale(0.9);}
  to{opacity:1;filter:blur(0);transform:scale(1);}
}

@keyframes lovePulse{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}

/* ENTRY */
.from-left{animation:fromLeft 1s;}
.from-right{animation:fromRight 1s;}
.from-bottom{animation:fromBottom 1s;}

@keyframes fromLeft{from{opacity:0;transform:translateX(-80px);}to{opacity:1;}}
@keyframes fromRight{from{opacity:0;transform:translateX(80px);}to{opacity:1;}}
@keyframes fromBottom{from{opacity:0;transform:translateY(60px);}to{opacity:1;}}

/* PETALS */
.petal{
  position:fixed;
  width:10px;height:10px;
  background:pink;
  border-radius:50%;
  top:-10px;
  animation:fall linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh) translateX(50px);opacity:0;}
}

/* BIRDS */
.bird{
  position:fixed;
  font-size:20px;
  top:20%;
  left:-50px;
  animation:fly 8s linear forwards;
}
@keyframes fly{
  to{transform:translateX(120vw);}
}

/* HEART */
.heart{
  position:fixed;
  color:var(--accent);
  animation:float 3s linear forwards;
}
@keyframes float{
  0%{opacity:0;}
  30%{opacity:1;}
  100%{transform:translateY(-150px);opacity:0;}
}
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="music" id="musicBtn">🔊</div>
<audio id="bgMusic" loop>
  <source src="music.mp3">
</audio>

<section class="hero">
  <h1>Our Story ❤️</h1>
  <p>Swipe or scroll</p>
</section>

<section class="slide">
  <img src="photo1.jpg">
  <div class="caption">
    <h2>The first moment</h2>
    <p id="t1"></p>
  </div>
</section>

<section class="slide">
  <img src="photo2.jpg">
  <div class="caption">
    <h2>Your smile</h2>
    <p id="t2"></p>
  </div>
</section>

<section class="slide">
  <img src="photo3.jpg">
  <div class="caption">
    <h2>Every moment</h2>
    <p id="t3"></p>
  </div>
</section>

<section class="final">
  <h1>I Love You ❤️</h1>
  <div class="love">Forever 💖</div>
</section>

<script>
const sections=document.querySelectorAll('section');
const progress=document.getElementById('progress');
let index=0;

function show(i){
  sections.forEach((s,idx)=>{
    s.style.transform=`translateY(${(idx-i)*100}%)`;
    s.classList.remove("from-left","from-right","from-bottom");

    if(idx===i){
      if(idx%3===0)s.classList.add("from-left");
      else if(idx%3===1)s.classList.add("from-right");
      else s.classList.add("from-bottom");
    }
  });

  progress.style.width=(i/(sections.length-1))*100+"%";

  runTyping(i);

  if(i===sections.length-1){
    petals();
    birds();
  }
}

/* SCROLL CONTROL */
let lock=false;
window.addEventListener('wheel',e=>{
  if(lock)return;
  lock=true;

  if(e.deltaY>0 && index<sections.length-1) index++;
  else if(e.deltaY<0 && index>0) index--;

  show(index);
  setTimeout(()=>lock=false,800);
});

/* SWIPE */
let startY=0;
window.addEventListener('touchstart',e=>{
  startY=e.touches[0].clientY;
});
window.addEventListener('touchend',e=>{
  let endY=e.changedTouches[0].clientY;

  if(startY-endY>50 && index<sections.length-1) index++;
  else if(endY-startY>50 && index>0) index--;

  show(index);
});

/* TYPING FIX */
let typingTimer;

function type(el,text){
  clearInterval(typingTimer);
  el.innerHTML="";
  let i=0;
  typingTimer=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(typingTimer);
  },60);
}

function runTyping(i){
  if(i===1) type(t1,"Everything changed when I saw you...");
  if(i===2) type(t2,"Your smile makes my world brighter...");
  if(i===3) type(t3,"Every moment with you feels like home...");
}

/* HEART */
document.addEventListener('click',e=>{
  let h=document.createElement('div');
  h.className='heart';
  h.innerHTML='❤️';
  h.style.left=e.clientX+'px';
  h.style.top=e.clientY+'px';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),3000);
});

/* MUSIC */
const music=document.getElementById('bgMusic');
const btn=document.getElementById('musicBtn');

btn.onclick=()=>{
  if(music.paused){music.play();btn.innerHTML="🔊";}
  else{music.pause();btn.innerHTML="🔇";}
};

/* PETALS */
function petals(){
  setInterval(()=>{
    let p=document.createElement('div');
    p.className='petal';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(Math.random()*3+3)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),5000);
  },300);
}

/* BIRDS */
function birds(){
  for(let i=0;i<3;i++){
    let b=document.createElement('div');
    b.className='bird';
    b.innerHTML='🕊️';
    b.style.top=(20+i*10)+'%';
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),8000);
  }
}

show(index);
</script>

</body>
</html>z
